# Self-hosted Gear Vault stack: app + PostgreSQL.
#
# Quick start:
#   export SESSION_SECRET=$(openssl rand -hex 32)   # set a real secret
#   docker compose up -d --build
#
# Then reach it at http://<this-host>:5001  (or the host's Tailscale IP/name).
#
# Data persists in named volumes (pgdata, uploads) across restarts/rebuilds.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gearvault
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gearvault}
      POSTGRES_DB: gearvault
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gearvault -d gearvault"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://gearvault:${POSTGRES_PASSWORD:-gearvault}@db:5432/gearvault
      # IMPORTANT: set a real secret (see quick start above). Defaults to the
      # repo placeholder only so the app boots on a private network.
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      PORT: 5000
      UPLOADS_DIR: /app/uploads
      # Accessed over http:// (e.g. Tailscale), so don't require HTTPS-only
      # cookies. Set to "true" if you serve the app over HTTPS (e.g. Tailscale
      # Serve / a reverse proxy with TLS).
      COOKIE_SECURE: "false"
    ports:
      # host:container — host port 5001 avoids the macOS AirPlay conflict on 5000.
      - "${APP_PORT:-5001}:5000"
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pgdata:
  uploads:
